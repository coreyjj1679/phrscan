<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/pharos-logo.png" />
    <link rel="apple-touch-icon" href="/pharos-logo.png" />
    <meta name="theme-color" content="#1414e6" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pharos Mini Explorer</title>
    <script>
      // Resolve theme before first paint to avoid a flash of the wrong theme.
      try {
        var s = JSON.parse(localStorage.getItem("miniscan:settings") || "{}");
        var mode = s.theme || "system";
        var resolved =
          mode === "system"
            ? window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark"
            : mode;
        document.documentElement.dataset.theme = resolved;
      } catch (e) {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
